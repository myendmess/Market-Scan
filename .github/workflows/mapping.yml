name: Market Map (refresh data)

on:
  schedule:
    - cron: '0 23 * * 1-5'   # 23:00 UTC, Mon–Fri — after US close
  workflow_dispatch:

# Only needs to commit the refreshed dataset; Pages auto-publishes from main
# (Settings → Pages → Deploy from a branch → main / root).
permissions:
  contents: write

concurrency:
  group: market-map
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Build S&P 500 dataset
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}   # optional 52-week fallback
        run: python mapping/scripts/build_sp500.py

      - name: Commit refreshed data
        run: |
          git config user.name "myendmess"
          git config user.email "boujnanemohamed23@gmail.com"
          git add mapping/dashboard/data/
          if git diff --staged --quiet; then
            echo "No data change to commit."
          else
            git commit -m "chore: refresh market map data $(date -u +%Y-%m-%d)"
            git push
          fi
