<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Market Map — Global Heatmap</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <style>
    :root{
      --bg:#0b0e14; --panel:#11151f; --line:#1e2533; --text:#e6edf3; --muted:#8b97a7;
      --accent:#fbbf24;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
      font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}
    header{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;
      flex-wrap:wrap;align-items:center;gap:14px}
    h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.2px}
    h1 span{color:var(--accent)}
    .crumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
    .crumb b{color:var(--text)}
    .chips{display:flex;flex-wrap:wrap;gap:6px}
    .chip{font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid var(--line);
      color:var(--muted);background:var(--panel);cursor:not-allowed}
    .chip.active{color:#0b0e14;background:var(--accent);border-color:var(--accent);
      font-weight:700;cursor:default}
    .legend{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}
    .bar{width:160px;height:10px;border-radius:6px;
      background:linear-gradient(90deg,#c83232,#464a54,#1f9b4e)}
    #map{width:100%;height:calc(100vh - 102px)}
    #status{padding:8px 18px;font-size:12px;color:var(--muted)}
    footer{padding:6px 18px;font-size:11px;color:var(--muted);border-top:1px solid var(--line)}
  </style>
</head>
<body>
  <header>
    <h1>Market <span>Map</span></h1>
    <div class="crumb">Global Markets <b>›</b> Americas <b>›</b> USA <b>›</b></div>
    <div class="chips" id="chips"></div>
    <div class="legend"><span>52w low</span><span class="bar"></span><span>52w high</span></div>
  </header>
  <div id="status">Loading…</div>
  <div id="map"></div>
  <footer>Size = market cap · Color = position in 52-week range · Free-tier data, research only — not advice.</footer>

  <script>
    // ---- global hierarchy (only S&P 500 active in v1) ----
    const INDEXES = [
      {id:'sp500', label:'S&P 500', active:true},
      {id:'dow30', label:'Dow 30'}, {id:'nasdaqcomp', label:'Nasdaq Composite'},
      {id:'russell2000', label:'Russell 2000'}, {id:'tsx', label:'S&P/TSX'},
      {id:'stoxx600', label:'STOXX 600'}, {id:'dax', label:'DAX 40'},
      {id:'nikkei', label:'Nikkei 225'}, {id:'kospi', label:'KOSPI'},
    ];
    const chips = document.getElementById('chips');
    for (const ix of INDEXES){
      const el = document.createElement('span');
      el.className = 'chip' + (ix.active ? ' active' : '');
      el.textContent = ix.label + (ix.active ? '' : ' · soon');
      chips.appendChild(el);
    }

    // ---- color: 0 (52w low)=red, .5=neutral, 1 (52w high)=green ----
    const lerp=(a,b,t)=>a.map((v,i)=>Math.round(v+(b[i]-v)*t));
    function colorFor(p){
      if(p==null) return '#3a4150';
      const lo=[200,50,50], mid=[70,74,84], hi=[31,155,78];
      const c = p<0.5 ? lerp(lo,mid,p/0.5) : lerp(mid,hi,(p-0.5)/0.5);
      return `rgb(${c[0]},${c[1]},${c[2]})`;
    }
    const fmtB = v => '$'+(v/1e9).toFixed(v>=1e11?0:1)+'B';

    function buildTree(rows){
      const sectors = {};
      for(const r of rows){
        const sec = r.gics_sector || 'Unknown';
        const ind = r.gics_sub_industry || 'Other';
        (sectors[sec] = sectors[sec] || {});
        (sectors[sec][ind] = sectors[sec][ind] || []).push(r);
      }
      return Object.entries(sectors).map(([sec,inds])=>({
        name: sec,
        children: Object.entries(inds).map(([ind,stocks])=>({
          name: ind,
          children: stocks.map(s=>({
            name: s.ticker, value: s.market_cap,
            itemStyle:{ color: colorFor(s.wk52_position) }, _raw: s
          }))
        }))
      }));
    }

    fetch('data/sp500.json').then(r=>r.json()).then(rows=>{
      document.getElementById('status').textContent =
        `S&P 500 · ${rows.length} names · sized by market cap, colored by 52-week position`;
      const chart = echarts.init(document.getElementById('map'), null, {renderer:'canvas'});
      chart.setOption({
        backgroundColor:'transparent',
        tooltip:{ formatter: info=>{
          const d = info.data && info.data._raw;
          if(!d) return `<b>${info.name}</b><br>${fmtB(info.value)}`;
          const pos = d.wk52_position==null?'n/a':(d.wk52_position*100).toFixed(0)+'%';
          return `<b>${d.ticker}</b> — ${d.name}<br>`+
                 `<span style="color:#8b97a7">${d.gics_sector} · ${d.gics_sub_industry}</span><br>`+
                 `Price $${d.price} &nbsp; MCap ${fmtB(d.market_cap)}<br>`+
                 `52w ${d.wk52_low}–${d.wk52_high} &nbsp; pos ${pos}`;
        }},
        series:[{
          type:'treemap', roam:true, nodeClick:'zoomToNode',
          width:'100%', height:'100%', top:0, left:0, right:0, bottom:0,
          data: buildTree(rows),
          label:{ show:true, formatter:'{b}', color:'#fff', fontSize:11, fontWeight:600 },
          upperLabel:{ show:true, height:22, color:'#cbd5e1', fontSize:12 },
          itemStyle:{ borderColor:'#0b0e14', borderWidth:1, gapWidth:1 },
          levels:[
            { itemStyle:{ borderColor:'#0b0e14', borderWidth:6, gapWidth:6 },
              upperLabel:{ show:true, color:'#fbbf24', fontWeight:700 } },
            { itemStyle:{ borderColor:'#0b0e14', borderWidth:2, gapWidth:2 } },
            { itemStyle:{ borderWidth:1, gapWidth:1 } }
          ],
          breadcrumb:{ show:true, bottom:4, itemStyle:{color:'#11151f'},
            textStyle:{color:'#8b97a7'} }
        }]
      });
      window.addEventListener('resize', ()=>chart.resize());
    }).catch(e=>{
      document.getElementById('status').textContent = 'Failed to load data: '+e;
    });
  </script>
</body>
</html>
