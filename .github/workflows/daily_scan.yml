name: Daily Market Scan

on:
  schedule:
    # 22:00 UTC, Mon–Fri = ~5–6 PM ET, safely after US market close.
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
    inputs:
      watchlist:
        description: 'Comma-separated tickers to scan instead of the dynamic universe'
        required: false
        default: ''

# Required so the workflow can push the report back with GITHUB_TOKEN.
permissions:
  contents: write

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market scan
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          WATCHLIST: ${{ github.event.inputs.watchlist }}
        run: python scripts/daily_scan.py

      - name: Commit & push report
        run: |
          git config user.name "myendmess"
          git config user.email "boujnanemohamed23@gmail.com"
          git add reports/
          if git diff --staged --quiet; then
            echo "No new report to commit."
          else
            git commit -m "chore: daily market scan $(date -u +%Y-%m-%d)"
            git push
          fi
